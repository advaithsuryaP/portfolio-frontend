<div class="timeline-layout py-8">
    <div
        class="timeline-grid"
        [style.row-gap]="rowGap"
        [style.grid-template-rows]="gridTemplateRows"
        [style.--highlight-color]="highlightColor() ?? 'transparent'"
        (mouseleave)="onHoverEnd()"
    >
        @for (tick of ticks; track tick.slug) {
            <time
                class="date-cell"
                [class.date-cell--year]="tick.isYearMark"
                [class.date-cell--highlighted]="isHighlighted(tick.rowIndex)"
                [style.grid-row]="tick.rowIndex + 1"
                [attr.datetime]="tick.slug"
                (mouseenter)="onTickHover(tick.rowIndex)"
            >
                {{ tick.label }}
            </time>

            <div class="tick-cell" [style.grid-row]="tick.rowIndex + 1" (mouseenter)="onTickHover(tick.rowIndex)">
                <span
                    class="tick"
                    [class.tick--year]="tick.isYearMark"
                    [class.tick--highlighted]="isHighlighted(tick.rowIndex)"
                    [class.tick--elongated]="isHighlighted(tick.rowIndex)"
                ></span>
            </div>

            <div class="moment-cell" [style.grid-row]="tick.rowIndex + 1">
                @for (moment of momentsAt(tick.rowIndex); track moment.id) {
                    <p class="moment-label" (mouseenter)="onMomentHover(tick.rowIndex, moment.color)">
                        <span class="moment-dot" [style.background-color]="moment.color"></span>
                        <span class="moment-text">{{ moment.label }}</span>
                    </p>
                }
            </div>
        }
    </div>
</div>
